<!DOCTYPE html>
<html>
    <head>
        <title>Passenger-Counter</title>
        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    </head>
    <body>
        <h1>People Entered: </h1>
        <h2 id="count-el">0</h2>
        <div id="button">
            <button id="increment-btn" onclick="increment()">INCREMENT<i class="bi bi-arrow-up-square-fill"></i></button>
            <button id="save-btn" onclick="save()">SAVE <i class="bi bi-clipboard"></i></button>
            <button id="decrement-btn" onclick="decrement()">DECREMENT<i class="bi bi-arrow-down-square-fill"></i></button>
        </div>
        <h1 id="prev">Previous Entries: </h1>
        <script src="index.js"></script>
    </body>
</html>
